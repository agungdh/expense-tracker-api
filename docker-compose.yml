services:
  postgres:
    image: postgres:18-alpine
    container_name: expense-tracker-postgres
    environment:
      POSTGRES_DB: expense-tracker
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    container_name: expense-tracker-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  postgres_data:
  valkey_data:
